name: Publish npm

on:
  push:
    tags:
      - v*

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install

      - name: Build
        run: pnpm build:core

      - name: Publish to npm
        run: pnpm publish --access public --no-git-checks --filter @easy-vite/plugin-html
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
